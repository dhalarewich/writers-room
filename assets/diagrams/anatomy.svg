<text x="690" y="222" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#e8e0d4" text-anchor="middle">memory/ — provisional ledger</text>
<text x="690" y="244" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#8a7f70" text-anchor="middle">learnings · your edit diffs</text>
