<text x="430" y="148" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#e09a5a" text-anchor="middle">card = one pillar × channels</text>
<line x1="430" y1="168" x2="430.0" y2="188.0" stroke="#8a7f70" stroke-width="1"/>
