<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" role="img" aria-label="Studio anatomy: channels and pillars meet in a card. Vault (ratified memory) and memory (provisional ledger) both feed the draft; memory graduates into vault after ships and your sign-off.">
